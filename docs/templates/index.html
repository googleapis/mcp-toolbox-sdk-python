<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Toolbox Python SDK API Reference</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }
        .version-group {
            margin-bottom: 2rem;
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .version-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #495057;
            display: flex;
            align-items: center;
        }
        .tag-badge {
            background-color: #6c757d;
            color: white;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-right: 0.8rem;
        }
        .tag-badge.latest {
            background-color: #28a745;
        }
        .package-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .package-item {
            display: block;
        }
        .package-item a {
            display: block;
            padding: 1rem;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            text-decoration: none;
            color: #007bff;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
        }
        .package-item a:hover {
            border-color: #007bff;
            background-color: #f1f8ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #6c757d;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <h1>MCP Toolbox Python SDK Documentation</h1>
    <div id="content">
        <p>Loading documentation versions...</p>
    </div>
    
    <div class="footer">
        Generated by Sphinx
    </div>

    <script>
        const PACKAGES = ["adk", "core", "langchain", "llamaindex"];

        fetch('versions.json')
            .then(r => r.json())
            .then(versions => {
                const content = document.getElementById('content');
                content.innerHTML = '';

                versions.forEach(version => {
                    const group = document.createElement('div');
                    group.className = 'version-group';
                    
                    const isLatest = version === 'latest';
                    
                    let html = `
                        <div class="version-title">
                            <span class="tag-badge ${isLatest ? 'latest' : ''}">${version}</span>
                        </div>
                        <div class="package-list">
                    `;
                    
                    PACKAGES.forEach(pkg => {
                        html += `
                            <div class="package-item">
                                <a href="${version}/${pkg}/index.html">${pkg}</a>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                    group.innerHTML = html;
                    content.appendChild(group);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('content').innerHTML = `
                    <p style="color: red">Error loading versions.json. Please ensure build/api-docs/versions.json exists.</p>
                `;
            });
    </script>
</body>
</html>
